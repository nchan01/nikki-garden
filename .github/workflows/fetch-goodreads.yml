name: Fetch Goodreads data

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Goodreads shelves
        run: |
          python3 - <<'PYEOF'
          import urllib.request, xml.etree.ElementTree as ET, json

          def fetch_shelf(shelf):
              url = f"https://www.goodreads.com/review/list_rss/29844189?shelf={shelf}"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=10) as r:
                  return r.read()

          def parse(xml_bytes):
              root = ET.fromstring(xml_bytes)
              items = []
              for item in root.findall('./channel/item'):
                  desc = item.findtext('description') or ''
                  # extract author from description HTML
                  author = ''
                  if 'author:' in desc.lower():
                      for line in desc.splitlines():
                          if 'author:' in line.lower():
                              import re
                              m = re.search(r'author:\s*([^<\n]+)', line, re.IGNORECASE)
                              if m:
                                  author = m.group(1).strip()
                                  break
                  items.append({
                      'title': item.findtext('title') or '',
                      'author': author,
                  })
              return items

          data = {
              'currently_reading': parse(fetch_shelf('currently-reading')),
              'read': parse(fetch_shelf('read'))[:8],
          }

          with open('goodreads.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(f"Currently reading: {len(data['currently_reading'])} books")
          print(f"Recently read: {len(data['read'])} books")
          PYEOF

      - name: Commit goodreads.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add goodreads.json
          git diff --staged --quiet || git commit -m "Update goodreads.json"
          git push
