<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikki C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      max-width: 560px;
      margin: 80px auto;
      padding: 0 24px;
      color: #111;
      background: #fff;
      line-height: 1.6;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 20px 0;
    }

    p {
      font-size: 0.95rem;
      color: #333;
      margin: 0 0 32px 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }

    li {
      font-size: 0.95rem;
    }

    a {
      color: #111;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover {
      color: #555;
    }

    .section {
      margin-top: 48px;
    }

    .section h2 {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin: 0 0 16px 0;
    }

    /* Writing */
    .post {
      margin-bottom: 20px;
    }

    .post a {
      font-size: 0.95rem;
      display: block;
      text-decoration: none;
      color: #111;
    }

    .post a:hover {
      color: #555;
    }

    .post time {
      display: block;
      font-size: 0.8rem;
      color: #999;
      margin-top: 2px;
    }

    /* Currently reading */
    .books-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .book-cover {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 72px;
    }

    .book-cover img {
      width: 72px;
      height: auto;
      display: block;
      border-radius: 2px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .book-cover span {
      font-size: 0.72rem;
      color: #666;
      line-height: 1.3;
    }

    /* Last read */
    .read-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .read-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 16px;
    }

    .read-item:last-child {
      border-bottom: none;
    }

    .read-title {
      font-size: 0.95rem;
      color: #111;
    }

    .read-author {
      font-size: 0.8rem;
      color: #999;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Nikki C</h1>
  <p>A decade-plus building <a href="https://lookingglassfactory.com" target="_blank" rel="noopener">holographic interfaces</a>. Now also thinking out loud about parenting, culture, and the tools reshaping everyday life.</p>

  <ul>
    <li><a href="https://nikkic.substack.com/">Substack</a></li>
    <li><a href="https://www.youtube.com/@nikkikaigi">YouTube</a></li>
    <li><a href="https://x.com/nikkiccccc">X</a></li>
    <li><a href="https://www.linkedin.com/in/nikkichanlkg/">LinkedIn</a></li>
    <li><a href="mailto:nchan01@gmail.com">nchan01 [at] gmail.com</a></li>
  </ul>

  <div class="section">
    <h2>Writing</h2>
    <div id="posts">Loading...</div>
  </div>

  <div class="section">
    <h2>Currently reading</h2>
    <div class="books-grid" id="currently-reading">Loading...</div>
  </div>

  <div class="section">
    <h2>Last read</h2>
    <ul class="read-list" id="last-read">Loading...</ul>
  </div>

  <script>
    const RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';

    function extractImage(description) {
      const match = description && description.match(/<img[^>]+src="([^"]+)"/);
      return match ? match[1].replace(/\._S[XY]\d+_\./g, '.') : null;
    }

    // Substack posts
    fetch(RSS2JSON + encodeURIComponent('https://nikkic.substack.com/feed'))
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('posts');
        container.innerHTML = '';
        data.items.slice(0, 8).forEach(item => {
          const date = new Date(item.pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
          container.innerHTML += `
            <div class="post">
              <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
              <time>${date}</time>
            </div>`;
        });
      })
      .catch(() => {
        document.getElementById('posts').innerHTML =
          '<a href="https://nikkic.substack.com/" target="_blank" rel="noopener">Read on Substack →</a>';
      });

    // Currently reading
    fetch(RSS2JSON + encodeURIComponent('https://www.goodreads.com/review/list_rss/29844189?shelf=currently-reading'))
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('currently-reading');
        container.innerHTML = '';
        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<span style="font-size:0.9rem;color:#999">Nothing at the moment</span>';
          return;
        }
        data.items.forEach(item => {
          const img = item.thumbnail || extractImage(item.description) || item.enclosure?.link;
          const author = item.author || '';
          container.innerHTML += `
            <div class="book-cover">
              ${img ? `<img src="${img}" alt="${item.title}" loading="lazy">` : ''}
              <span>${item.title}</span>
            </div>`;
        });
      })
      .catch(() => {
        document.getElementById('currently-reading').innerHTML =
          '<a href="https://www.goodreads.com/user/show/29844189-nikki" target="_blank" rel="noopener">View on Goodreads →</a>';
      });

    // Last read
    fetch(RSS2JSON + encodeURIComponent('https://www.goodreads.com/review/list_rss/29844189?shelf=read'))
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('last-read');
        container.innerHTML = '';
        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<li style="font-size:0.9rem;color:#999">Nothing yet</li>';
          return;
        }
        data.items.slice(0, 8).forEach(item => {
          const author = item.author || '';
          container.innerHTML += `
            <li class="read-item">
              <span class="read-title">${item.title}</span>
              <span class="read-author">${author}</span>
            </li>`;
        });
      })
      .catch(() => {
        document.getElementById('last-read').innerHTML =
          '<li><a href="https://www.goodreads.com/user/show/29844189-nikki" target="_blank" rel="noopener">View on Goodreads →</a></li>';
      });
  </script>
</body>
</html>
