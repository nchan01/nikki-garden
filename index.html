<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nikki C</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      max-width: 560px;
      margin: 80px auto;
      padding: 0 24px;
      color: #111;
      background: #fff;
      line-height: 1.6;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 20px 0;
    }

    p {
      font-size: 0.95rem;
      color: #333;
      margin: 0 0 32px 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 20px;
    }

    li {
      font-size: 0.95rem;
    }

    a {
      color: #111;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover {
      color: #555;
    }

    .writing {
      margin-top: 48px;
    }

    .writing h2 {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin: 0 0 16px 0;
    }

    .post {
      margin-bottom: 20px;
    }

    .post a {
      font-size: 0.95rem;
      display: block;
      text-decoration: none;
      color: #111;
    }

    .post a:hover {
      color: #555;
    }

    .post time {
      display: block;
      font-size: 0.8rem;
      color: #999;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>Nikki C</h1>
  <p>A decade-plus building <a href="https://lookingglassfactory.com" target="_blank" rel="noopener">holographic interfaces</a>. Now also thinking out loud about parenting, culture, and the tools reshaping everyday life.</p>
  <ul>
    <li><a href="https://nikkic.substack.com/">Substack</a></li>
    <li><a href="https://www.youtube.com/@nikkikaigi">YouTube</a></li>
    <li><a href="https://x.com/nikkiccccc">X</a></li>
    <li><a href="https://www.linkedin.com/in/nikkichanlkg/">LinkedIn</a></li>
    <li><a href="mailto:nchan01@gmail.com">nchan01 [at] gmail.com</a></li>
  </ul>
  <div class="writing">
    <h2>Writing</h2>
    <div id="posts">Loading...</div>
  </div>

  <script>
    fetch('https://api.rss2json.com/v1/api.json?rss_url=https://nikkic.substack.com/feed')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('posts');
        container.innerHTML = '';
        data.items.forEach(item => {
          const date = new Date(item.pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
          container.innerHTML += `
            <div class="post">
              <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
              <time>${date}</time>
            </div>`;
        });
      })
      .catch(() => {
        document.getElementById('posts').innerHTML =
          '<a href="https://nikkic.substack.com/" target="_blank" rel="noopener">Read on Substack →</a>';
      });
  </script>
</body>
</html>
